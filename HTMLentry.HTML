<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance Progress</title>
  <style>
    :root {
      --bg-1: #05070b;
      --bg-2: #0b0f16;
      --panel: rgba(16, 20, 28, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #b7c0cc;
      --accent: #00d084;
      --accent-2: #00a8ff;
      --glow: rgba(0, 208, 132, 0.45);
      --shadow: rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 208, 132, 0.12), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(0, 168, 255, 0.10), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(255, 255, 255, 0.05), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
      pointer-events: none;
      animation: gridMove 14s linear infinite;
    }

    @keyframes gridMove {
      0% {
        transform: translateY(0) translateX(0);
      }
      50% {
        transform: translateY(-10px) translateX(-10px);
      }
      100% {
        transform: translateY(0) translateX(0);
      }
    }

    .orbs {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(12px);
      opacity: 0.35;
      animation: floatOrb linear infinite;
    }

    .orb:nth-child(1) {
      width: 220px;
      height: 220px;
      left: 8%;
      top: 18%;
      background: rgba(0, 208, 132, 0.18);
      animation-duration: 16s;
    }

    .orb:nth-child(2) {
      width: 160px;
      height: 160px;
      right: 12%;
      top: 20%;
      background: rgba(0, 168, 255, 0.18);
      animation-duration: 20s;
    }

    .orb:nth-child(3) {
      width: 280px;
      height: 280px;
      left: 50%;
      bottom: -60px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.08);
      animation-duration: 24s;
    }

    @keyframes floatOrb {
      0%   { transform: translateY(0px) translateX(0px) scale(1); }
      25%  { transform: translateY(-20px) translateX(18px) scale(1.05); }
      50%  { transform: translateY(15px) translateX(-12px) scale(0.98); }
      75%  { transform: translateY(-12px) translateX(10px) scale(1.03); }
      100% { transform: translateY(0px) translateX(0px) scale(1); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(92vw, 700px);
      padding: 52px 32px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 20px 60px var(--shadow),
        inset 0 0 0 1px rgba(255,255,255,0.03),
        0 0 30px rgba(0,208,132,0.05);
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 1s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 28px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,208,132,0.25), rgba(0,168,255,0.2), rgba(255,255,255,0.06));
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--glow);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: 0.7; }
    }

    h1 {
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }

    .subtitle {
      font-size: clamp(15px, 2vw, 18px);
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto 34px;
      line-height: 1.6;
    }

    .btn-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-width: 280px;
      padding: 18px 34px;
      border: 0;
      border-radius: 18px;
      text-decoration: none;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.35px;
      cursor: pointer;
      background: linear-gradient(135deg, #00c97b, #00a8ff);
      box-shadow:
        0 10px 30px rgba(0, 168, 255, 0.28),
        0 8px 24px rgba(0, 208, 132, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      overflow: hidden;
    }

    .main-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      transition: left 0.7s ease;
    }

    .main-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 16px 40px rgba(0, 168, 255, 0.35),
        0 12px 32px rgba(0, 208, 132, 0.28);
      filter: brightness(1.06);
    }

    .main-btn:hover::before {
      left: 150%;
    }

    .main-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .arrow {
      font-size: 20px;
      transition: transform 0.25s ease;
    }

    .main-btn:hover .arrow {
      transform: translateX(4px);
    }

    .footer-note {
      margin-top: 26px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.3px;
    }

    .corner-line {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .corner-line.tl {
      top: 18px;
      left: 18px;
      border-right: none;
      border-bottom: none;
      border-radius: 18px 0 0 0;
    }

    .corner-line.br {
      bottom: 18px;
      right: 18px;
      border-left: none;
      border-top: none;
      border-radius: 0 0 18px 0;
    }

    @media (max-width: 640px) {
      .card {
        padding: 40px 22px;
        border-radius: 22px;
      }

      .main-btn {
        min-width: 100%;
        font-size: 17px;
      }

      .corner-line {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <main class="container">
    <section class="card">
      <div class="corner-line tl"></div>
      <div class="corner-line br"></div>

      <div class="badge">
        <span class="dot"></span>
        <span>Entry Portal</span>
      </div>

      <h1>Maintenance Progress</h1>
      <p class="subtitle">
        Welcome to the maintenance dashboard entry page. Click the button below to open the live progress system.
      </p>

      <div class="btn-wrap">
        <a id="progressLink" class="main-btn" href="#" target="_self" rel="noopener noreferrer">
          <span>Maintenance Progress</span>
          <span class="arrow">→</span>
        </a>
      </div>

      <div class="footer-note">
        Fast access portal
      </div>
    </section>
  </main>

  <script>
    /*
      =========================================================
      CHANGE THE LINK BELOW IN THE FUTURE IF YOUR GOOGLE SCRIPT URL CHANGES
      Just replace the URL between the quotes.
      =========================================================
    */

    document.getElementById("progressLink").href = TARGET_URL;
  </script>
</body>
</html>
